# Role Radar — AI Companies Overrides
#
# This file lets you add/remove companies from the in-code AI seed list
# without touching Python. Bump `last_updated` whenever you edit it so that
# future-you knows when the list was last reviewed.
#
# Schema:
#   last_updated: YYYY-MM-DD
#   add:
#     - name: "Company Name"           # required
#       homepage: "https://..."
#       careers_url: "https://..."
#       ats_type: greenhouse|lever|ashby|smartrecruiters|generic_html|unknown
#       ats_identifier: "board-token"  # for greenhouse/lever/ashby
#       category: frontier_lab|ai_infra|ai_apps|ai_dev_tools|ai_adjacent
#       funding_amount_m: 250          # optional, in $M
#       employee_count_estimate: 100   # optional
#       is_public: false               # optional
#       github_stars: 10000            # optional
#       description: "one-line summary shown in the email/report"
#       notable_achievements:          # optional, list of strings
#         - "Series B led by a16z"
#   remove:
#     - "Adept"                        # match by exact name (case-insensitive)

